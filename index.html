<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Device Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background-color: #050508; 
            color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 0; opacity: 0.35; pointer-events: none; }

        .top-bar {
            position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: linear-gradient(180deg, rgba(5,5,8,0.95) 0%, rgba(5,5,8,0) 100%); width: 100%;
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 45px; height: 45px; border-radius: 50%; background: #13111C; 
            display: flex; justify-content: center; align-items: center;
            border: 2px solid rgba(139, 92, 246, 0.5); overflow: hidden; box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }
        .avatar svg { width: 24px; height: 24px; fill: #a78bfa; }
        .details { display: flex; flex-direction: column; }
        
        .name { font-size: 15px; font-weight: 700; color: #ffffff; letter-spacing: 0.5px; text-transform: uppercase; }
        .id { font-size: 11px; color: #8fa0b5; margin-top: 3px; letter-spacing: 1px; }
        
        .status-badge {
            display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px;
            font-size: 11px; font-weight: 800; letter-spacing: 1.5px;
            background: rgba(139, 92, 246, 0.1); color: #c4b5fd;
            border: 1px solid rgba(139, 92, 246, 0.4); box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        }
        .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #c4b5fd; box-shadow: 0 0 8px #c4b5fd; animation: pulse 1.5s infinite; }
        
        .badge-active { background: rgba(16, 185, 129, 0.1); color: #34d399; border-color: rgba(16, 185, 129, 0.4); box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .badge-active .dot { background: #34d399; box-shadow: 0 0 8px #34d399; animation: none; }
        .badge-error { background: rgba(239, 68, 68, 0.1); color: #f87171; border-color: rgba(239, 68, 68, 0.4); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        .badge-error .dot { background: #f87171; box-shadow: 0 0 8px #f87171; animation: none; }

        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; z-index: 10; padding: 0 20px; }
        
        .card-wrapper {
            position: relative; width: 100%; max-width: 340px; border-radius: 24px;
            background: linear-gradient(135deg, #0ff, #8b5cf6, #f0f);
            padding: 2px; 
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
        }
        
        .card {
            background: #0D0F18; border-radius: 22px; width: 100%; height: 100%;
            padding: 40px 20px; text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }

        .graphic-container { width: 150px; height: 150px; margin-bottom: 25px; position: relative; display: flex; justify-content: center; align-items: center; }
        
        .sci-fi-loader { position: relative; width: 140px; height: 140px; display: flex; justify-content: center; align-items: center; }
        
        .core { width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 60px #f0f; z-index: 10; animation: pulseCore 2s infinite alternate; }
        
        .ring { position: absolute; border-radius: 50%; border: 2px solid transparent; }
        .ring-1 { width: 50px; height: 50px; border-top: 2px solid #0ff; border-bottom: 2px solid #0ff; animation: spin 2s linear infinite; filter: drop-shadow(0 0 8px #0ff); }
        .ring-2 { width: 75px; height: 75px; border-left: 2px solid #f0f; border-right: 2px dashed #f0f; animation: spin 3.5s linear infinite reverse; filter: drop-shadow(0 0 10px #f0f); }
        .ring-3 { width: 105px; height: 105px; border-top: 3px solid #0ff; border-right: 3px solid rgba(139,92,246,0.8); animation: spin 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; filter: drop-shadow(0 0 12px #0ff); }
        .ring-4 { width: 135px; height: 135px; border: 1px solid rgba(139, 92, 246, 0.4); animation: spin 5s linear infinite; }
        .ring-5 { width: 135px; height: 135px; border: 1px solid rgba(0, 255, 255, 0.3); animation: spin 7s linear infinite reverse; }
        
        .orbit-dot { position: absolute; top: -4px; left: 50%; width: 8px; height: 8px; background: #0ff; border-radius: 50%; transform: translateX(-50%); box-shadow: 0 0 15px #0ff; }
        .orbit-dot-2 { position: absolute; bottom: -4px; left: 50%; width: 8px; height: 8px; background: #f0f; border-radius: 50%; transform: translateX(-50%); box-shadow: 0 0 15px #f0f; }

        .result-icon { display: none; width: 100px; height: 100px; border-radius: 50%; justify-content: center; align-items: center; border: 3px solid transparent; }
        .result-icon svg { width: 50px; height: 50px; }
        .icon-success { border-color: rgba(16, 185, 129, 0.6); background: rgba(16, 185, 129, 0.1); box-shadow: 0 0 40px rgba(16, 185, 129, 0.3); }
        .icon-success svg { stroke: #10b981; }
        .icon-error { border-color: rgba(239, 68, 68, 0.6); background: rgba(239, 68, 68, 0.1); box-shadow: 0 0 40px rgba(239, 68, 68, 0.3); }
        .icon-error svg { stroke: #ef4444; }

        h2 { margin: 0 0 10px; font-size: 26px; font-weight: 800; letter-spacing: 0.5px; }
        .gradient-text { background: linear-gradient(90deg, #0ff, #f0f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { margin: 0 0 25px; font-size: 14px; color: #8fa0b5; line-height: 1.5; padding: 0 10px; }
        .text-success { color: #10b981; } .text-error { color: #ef4444; }

        .progress-track { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-bottom: 10px; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #0ff, #8b5cf6, #f0f); border-radius: 10px; animation: progress 2.5s ease-in-out infinite; box-shadow: 0 0 10px rgba(139, 92, 246, 0.5); }

        .action-btn { display: none; width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 16px; font-weight: 800; color: #fff; letter-spacing: 1px; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-success { background: linear-gradient(90deg, #059669, #10b981); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        .btn-error { background: linear-gradient(90deg, #dc2626, #ef4444); box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2); }

        .footer { position: relative; z-index: 10; text-align: center; padding: 20px; font-size: 12px; color: #4b5563; font-weight: 600; letter-spacing: 0.5px; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes pulseCore { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(1.2); opacity: 1; } }
        @keyframes progress { 0% { width: 0%; transform: translateX(-100%); } 50% { width: 100%; transform: translateX(0%); } 100% { width: 100%; transform: translateX(100%); } }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="top-bar">
        <div class="user-info">
            <div class="avatar">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <div class="details">
                <div class="name" id="display-name">Loading...</div>
                <div class="id" id="display-id">ID: Fetching...</div>
            </div>
        </div>
        <div class="status-badge" id="status-badge">
            <span class="dot"></span> <span id="badge-text">SCANNING</span>
        </div>
    </div>

    <div class="main-content">
        <div class="card-wrapper">
            <div class="card">
                
                <div class="graphic-container" id="graphic-box">
                    <div class="sci-fi-loader" id="loader-ring">
                        <div class="core"></div>
                        <div class="ring ring-1"></div>
                        <div class="ring ring-2"></div>
                        <div class="ring ring-3"></div>
                        <div class="ring ring-4"><div class="orbit-dot"></div></div>
                        <div class="ring ring-5"><div class="orbit-dot-2"></div></div>
                    </div>
                    <div class="result-icon icon-success" id="icon-success">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                    </div>
                    <div class="result-icon icon-error" id="icon-error">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </div>
                </div>

                <h2 id="card-title" class="gradient-text">Device Verification</h2>
                <p id="card-desc">Verifying device authenticity...</p>

                <div class="progress-track" id="progress-bar">
                    <div class="progress-fill"></div>
                </div>

                <button class="action-btn" id="continue-btn" onclick="Telegram.WebApp.close()">CLOSE</button>
            </div>
        </div>
    </div>

    <div class="footer" id="dynamic-footer">
        © 2026 OWNER SAHAB | Designed By OWNER SAHAB
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        
        const chars = '0189ABCDEF'; 
        const fontSize = 12;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 5, 8, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillStyle = Math.random() > 0.5 ? '#0ff' : '#8b5cf6';
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Ensure name displays cleanly using URL parameters, overriding the buggy "GUEST" default
        const urlParams = new URLSearchParams(window.location.search);
        let urlName = urlParams.get('name');
        if (urlName) {
            try { urlName = decodeURIComponent(urlName); } catch(e) {}
        } else {
            urlName = 'User';
        }
        
        const urlUid = urlParams.get('uid') || 'Unknown';
        const botUsername = urlParams.get('bot');

        // Target Native User Data First
        const tgUser = tg.initDataUnsafe?.user;
        let finalName = urlName;
        if (tgUser && tgUser.first_name) {
            finalName = tgUser.first_name;
            if (tgUser.last_name) finalName += ' ' + tgUser.last_name;
        }
        const finalUid = tgUser?.id || urlUid;

        document.getElementById('display-name').innerText = finalName;
        document.getElementById('display-id').innerText = `ID: ${finalUid}`;

        const badge = document.getElementById('status-badge');
        const badgeText = document.getElementById('badge-text');
        const cardTitle = document.getElementById('card-title');
        const cardDesc = document.getElementById('card-desc');
        const progressBar = document.getElementById('progress-bar');
        const continueBtn = document.getElementById('continue-btn');
        const loaderRing = document.getElementById('loader-ring');
        const iconSuccess = document.getElementById('icon-success');
        const iconError = document.getElementById('icon-error');

        // Generates a totally unique string and saves it permanently to the browser
        function getUniqueDeviceToken() {
            let token = localStorage.getItem('bot_device_token');
            if (!token) {
                token = 'dev_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
                localStorage.setItem('bot_device_token', token);
            }
            return token;
        }

        async function verifyDevice() {
            try {
                // Rock-solid collision-free Multi Account Blocker
                const finalHash = getUniqueDeviceToken(); 

                loaderRing.style.display = 'none';
                progressBar.style.display = 'none';
                iconSuccess.style.display = 'flex';
                
                cardTitle.innerText = "Scan Complete";
                cardTitle.className = "text-success";
                cardDesc.innerText = "Fingerprint secured. Automatically redirecting...";
                
                badge.className = "status-badge badge-active";
                badgeText.innerText = "VERIFIED";

                // Setup manual redirect button just in case the auto redirect fails on their Android version
                continueBtn.style.display = 'block';
                continueBtn.className = "action-btn btn-success";
                continueBtn.innerText = "RETURN TO BOT";
                
                const deepLinkUrl = `https://t.me/${botUsername}?start=v_${finalHash}`;
                
                continueBtn.onclick = () => {
                    if (botUsername) tg.openTelegramLink(deepLinkUrl);
                };

                // Automatically open the deep link without breaking it via tg.close()
                setTimeout(() => {
                    if (botUsername) tg.openTelegramLink(deepLinkUrl);
                }, 1500);

            } catch (error) {
                loaderRing.style.display = 'none';
                progressBar.style.display = 'none';
                iconError.style.display = 'flex';
                
                cardTitle.innerText = "Verification Failed";
                cardTitle.className = "text-error";
                cardDesc.innerText = "Could not generate device fingerprint. Please try again.";
                
                badge.className = "status-badge badge-error";
                badgeText.innerText = "ERROR";
                
                continueBtn.style.display = 'block';
                continueBtn.className = "action-btn btn-error";
            }
        }

        // Run the verification process after 2 seconds
        setTimeout(verifyDevice, 2000); 
    </script>
</body>
</html>
